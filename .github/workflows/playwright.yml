name: Simple Math CI

on:
  workflow_dispatch:
   inputs:
      test_1:
        description: "The name to say hello to"
        required: true
        default: "1"
      test_2:
        description: "The name to say hello to"
        required: true
        default: "1"
      push:
        branches: 
         - main

env: 
  test_1: ${{ inputs.test_1 }}
  test_2: "10"

jobs:
  say-hello:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.step1.outputs.result }}
    steps:
      - name: Step 1 - Say hello
      env: 
        test_1: ${{ env.test_1 || inputs.test_1 }}
        test_2: ${{ env.test_2 || inputs.test_2 }}
        run: 
          result=$(($test_1 + $test_2))
          echo "Result: $result"

  say-hello-2:
    runs-on: ubuntu-latest
    needs: say-hello
    steps:
      - name: Step 1 - Say hello
      env: 
        test_1: ${{ env.test_1 || inputs.test_1 }}
        
        run: 
          result=$(($test_1 + ${{ needs.say-hello.outputs.result }}))
          echo "Result: $result"
